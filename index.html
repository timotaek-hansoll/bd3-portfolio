<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hansoll BD3 Portfolio Manager</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for parsing JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    // Explicitly configure Babel to use the "classic" runtime to avoid browser import errors
    Babel.registerPreset('react-classic', {
      presets: [
        [Babel.availablePresets.react, { "runtime": "classic" }]
      ]
    });
  </script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    
    // Export to global scope so the React component can access them
    window.firebase = {
      initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
      getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc
    };
  </script>

  <style>
    /* Custom scrollbar and animations */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slide-in-from-right { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes zoom-in { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    .animate-in.fade-in { animation: fade-in 0.3s ease-out forwards; }
    .animate-in.slide-in-from-right-10 { animation: slide-in-from-right 0.3s ease-out forwards; }
    .animate-in.zoom-in { animation: zoom-in 0.2s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 overflow-hidden h-screen">
  
  <div id="root"></div>

  <script type="text/babel" data-presets="react-classic">
    const { useState, useEffect, useRef } = React;

    // --- ICON HELPER COMPONENT ---
    const Icon = ({ name, size = 24, className = '', color = 'currentColor' }) => {
      const iconRef = useRef(null);
      useEffect(() => {
        if (iconRef.current && window.lucide) {
          // Map older icon names to updated Lucide v0.300+ names
          const nameMap = {
            'CheckCircle2': 'CircleCheck',
            'Edit2': 'Pencil',
            'UserCircle': 'CircleUser',
            'BarChart3': 'ChartColumn'
          };
          const actualName = nameMap[name] || name;
          
          // Convert PascalCase to kebab-case (e.g. CircleCheck -> circle-check)
          const kebabName = actualName.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
          
          iconRef.current.innerHTML = `<i data-lucide="${kebabName}" class="${className}"></i>`;
          window.lucide.createIcons({
            root: iconRef.current,
            attrs: { width: size, height: size, stroke: color, 'stroke-width': 2 }
          });
        }
      }, [name, size, className, color]);
      return <span ref={iconRef} className="inline-flex items-center justify-center" />;
    };

    // --- GLOBAL VARIABLES & APP INIT ---
    const startApp = () => {
      if (!window.firebase) {
        setTimeout(startApp, 50); // Keep checking every 50ms until Firebase is fully loaded
        return;
      }

      // Paste your keys from Firebase here:
      const firebaseConfig = {
        apiKey: "AIzaSyBodBadJ85WxphBq-8GmT-zwKzo0b3HRls",
        authDomain: "bd3-portfolio.firebaseapp.com",
        projectId: "bd3-portfolio",
        storageBucket: "bd3-portfolio.firebasestorage.app",
        messagingSenderId: "723739190377",
        appId: "1:723739190377:web:2e2914b86a2f324e7e2ef8"
      };
      
      const appId = 'hansoll-bd3-cloud';

      let app, auth, db;
      try {
        app = window.firebase.initializeApp(firebaseConfig);
        auth = window.firebase.getAuth(app);
        db = window.firebase.getFirestore(app);
      } catch (err) {
        console.error("Firebase Initialization Error:", err);
      }

      // --- INITIAL DATA UPDATED FOR BD3 ---
      const INITIAL_Y_CRITERIA = [
        { id: 'y1', name: 'Revenue Scale & Strategic Weight', weight: 15 },
        { id: 'y2', name: 'Growth Opportunity', weight: 25 },
        { id: 'y3', name: 'Financial Health (Payment)', weight: 25 },
        { id: 'y4', name: 'Strategic Alignment (ESG)', weight: 15 },
        { id: 'y5', name: 'Future Proof / Innovation', weight: 20 },
      ];

      const INITIAL_X_CRITERIA = [
        { id: 'x1', name: 'Operating Margin %', weight: 25 },
        { id: 'x2', name: 'OQL & Exceptions', weight: 20 },
        { id: 'x3', name: 'Efficiency / VPMH', weight: 20 },
        { id: 'x4', name: 'Average Lead Time', weight: 15 },
        { id: 'x5', name: 'Capacity Utilization', weight: 20 },
      ];

      const INITIAL_CUSTOMERS = [
        { id: 'bd3-1', name: 'Strategic Global Client A', revenue: 95, yScores: { y1: 5, y2: 4, y3: 4, y4: 5, y5: 4 }, xScores: { x1: 4, x2: 4, x3: 3, x4: 3, x5: 4 } },
        { id: 'bd3-2', name: 'Emerging Tech Partner', revenue: 30, yScores: { y1: 2, y2: 5, y3: 3, y4: 4, y5: 5 }, xScores: { x1: 5, x2: 2, x3: 4, x4: 4, x5: 2 } },
        { id: 'bd3-3', name: 'Value Volume Retailer', revenue: 110, yScores: { y1: 5, y2: 3, y3: 2, y4: 2, y5: 2 }, xScores: { x1: 2, x2: 3, x3: 5, x4: 5, x5: 5 } }
      ];

      function App() {
        const [activeTab, setActiveTab] = useState('home');
        const [customers, setCustomers] = useState(INITIAL_CUSTOMERS);
        const [yCriteria, setYCriteria] = useState(INITIAL_Y_CRITERIA);
        const [xCriteria, setXCriteria] = useState(INITIAL_X_CRITERIA);
        const [editingId, setEditingId] = useState(null);
        const [showCheatSheet, setShowCheatSheet] = useState(false);
        
        const [savedSimulations, setSavedSimulations] = useState([]);
        const [cloudSimulations, setCloudSimulations] = useState([]);
        const [currentSimName, setCurrentSimName] = useState('BD3 Q1 Baseline');
        const [toast, setToast] = useState(null);
        const fileInputRef = useRef(null);

        const [user, setUser] = useState(null);
        const [authLoading, setAuthLoading] = useState(!!auth);

        const showToast = (message, type = 'success') => {
          setToast({ message, type });
          setTimeout(() => setToast(null), 3500);
        };

        useEffect(() => {
          if (!auth) { setAuthLoading(false); return; }

          const initAuth = async () => {
            let delay = 1000;
            for (let i = 0; i < 5; i++) {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await window.firebase.signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await window.firebase.signInAnonymously(auth);
                }
                break;
              } catch (err) {
                if (i === 4) showToast("Cloud connection error. Operating in offline mode.", "error");
                await new Promise(res => setTimeout(res, delay));
                delay *= 2;
              }
            }
            setAuthLoading(false);
          };

          initAuth();
          const unsubscribe = window.firebase.onAuthStateChanged(auth, setUser);
          return () => unsubscribe();
        }, []);

        useEffect(() => {
          if (!db || !user) return;
          const colRef = window.firebase.collection(db, 'artifacts', appId, 'public', 'data', 'simulations');
          const unsubscribe = window.firebase.onSnapshot(colRef, (snapshot) => {
            const sims = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            sims.sort((a, b) => (Number(b.id) || 0) - (Number(a.id) || 0));
            setCloudSimulations(sims);
          }, (err) => {
            console.error("Firestore sync fail", err);
            showToast("Cloud sync failed. Switched to offline view.", "error");
          });
          return () => unsubscribe();
        }, [user]);

        useEffect(() => {
          const saved = localStorage.getItem('hansoll_bd3_sims');
          if (saved) setSavedSimulations(JSON.parse(saved));
        }, []);

        useEffect(() => localStorage.setItem('hansoll_bd3_sims', JSON.stringify(savedSimulations)), [savedSimulations]);

        const calculatePosition = (customer) => {
          const yTotal = yCriteria.reduce((sum, c) => sum + ((customer.yScores[c.id] || 3) * (c.weight / 100)), 0);
          const xTotal = xCriteria.reduce((sum, c) => sum + ((customer.xScores[c.id] || 3) * (c.weight / 100)), 0);
          return { x: xTotal, y: yTotal };
        };

        const getAction = (x, y) => {
          const threshold = 3.0;
          if (y >= threshold && x >= threshold) return { label: 'INVEST', color: 'bg-indigo-600', ring: 'ring-indigo-200' };
          if (y >= threshold && x < threshold) return { label: 'PROTECT / FIX', color: 'bg-orange-500', ring: 'ring-orange-200' };
          if (y < threshold && x >= threshold) return { label: 'HARVEST', color: 'bg-emerald-600', ring: 'ring-emerald-200' };
          return { label: 'EXIT', color: 'bg-rose-600', ring: 'ring-rose-200' };
        };

        const handleSaveSimulation = async (saveToCloud = false) => {
          const simId = Date.now().toString();
          const newSim = { id: simId, name: currentSimName || `BD3 Sim ${new Date().toLocaleTimeString()}`, timestamp: new Date().toLocaleString(), data: { customers, yCriteria, xCriteria }, creator: user?.uid || 'Local Backup' };

          if (saveToCloud) {
            if (!db || !user) {
              showToast("Cannot connect to Cloud. Scenario saved locally.", "info");
              setSavedSimulations([newSim, ...savedSimulations]);
              return;
            }
            try {
              await window.firebase.setDoc(window.firebase.doc(db, 'artifacts', appId, 'public', 'data', 'simulations', simId), newSim);
              showToast("Saved to Cloud Shared Database");
            } catch (err) {
              showToast("Error updating shared database", "error");
            }
          } else {
            setSavedSimulations([newSim, ...savedSimulations]);
            showToast("Saved to Local Device Storage");
          }
        };

        const loadSimulation = (sim) => {
          setCustomers(sim.data.customers); setYCriteria(sim.data.yCriteria); setXCriteria(sim.data.xCriteria); setCurrentSimName(sim.name); showToast(`Loaded scenario: ${sim.name}`);
        };

        const deleteSimulation = async (id, isCloud = false) => {
          if (isCloud) {
            if (!db || !user) return;
            try {
              await window.firebase.deleteDoc(window.firebase.doc(db, 'artifacts', appId, 'public', 'data', 'simulations', id));
              showToast("Shared scenario deleted from cloud");
            } catch (err) { showToast("Unable to delete shared scenario", "error"); }
          } else {
            setSavedSimulations(savedSimulations.filter(s => s.id !== id)); showToast("Local backup removed");
          }
        };

        const handleImportClick = () => fileInputRef.current?.click();

        const handleFileImport = (event) => {
          const file = event.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const importedData = JSON.parse(e.target.result);
              let simsToAdd = [];
              if (Array.isArray(importedData)) {
                simsToAdd = importedData;
              } else if (importedData && importedData.data && importedData.data.customers) {
                simsToAdd = [importedData];
              }
              
              const validSims = simsToAdd.filter(sim => sim.data && Array.isArray(sim.data.customers)).map(sim => ({
                ...sim,
                id: Date.now().toString() + '-' + Math.random().toString(36).substring(2, 7) // Ensure unique IDs
              }));

              if (validSims.length > 0) {
                setSavedSimulations(prev => [...validSims, ...prev]); 
                showToast(`Imported ${validSims.length} BD3 scenarios`);
              } else {
                showToast("No valid scenarios found in file", "error");
              }
            } catch (err) { showToast("Invalid JSON format. File may be corrupted.", "error"); }
          };
          reader.readAsText(file);
          event.target.value = '';
        };

        const totalRev = customers.reduce((s, c) => s + (Number(c.revenue) || 0), 0);
        const handleRevenueChange = (id, value) => {
          setCustomers(customers.map(c => c.id === id ? { ...c, revenue: value === '' ? '' : Number(value) } : c));
        };

        const CheatSheet = () => (
          <div className={`fixed inset-y-0 right-0 w-full sm:w-[500px] bg-white shadow-2xl z-[1000] transform transition-transform duration-300 ease-in-out flex flex-col ${showCheatSheet ? 'translate-x-0' : 'translate-x-full'}`}>
            <div className="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-900 text-white">
              <div>
                <h2 className="text-xl font-bold tracking-tight">Scoring Cheat Sheet</h2>
                <p className="text-xs text-slate-400 uppercase tracking-widest mt-1">Rolling 12-Month Logic Standards</p>
              </div>
              <button onClick={() => setShowCheatSheet(false)} className="p-2 hover:bg-white/10 rounded-full transition"><Icon name="X" size={24} /></button>
            </div>
            <div className="flex-1 overflow-y-auto p-6 space-y-8 pb-12">
              <section>
                <h3 className="text-sm font-black text-indigo-600 uppercase mb-4 flex items-center gap-2"><Icon name="TrendingUp" size={16} /> Customer Attractiveness (Y-Axis)</h3>
                <div className="space-y-4">
                  <div className="bg-slate-50 p-4 rounded-xl"><p className="text-xs font-bold text-slate-500 mb-2 flex items-center gap-1"><Icon name="Users" size={12}/> Revenue Scale (15%)</p><div className="text-[11px] space-y-1"><div className="flex justify-between"><span>5: ≥ $30M</span> <span className="text-slate-400">4: $15M-$29.9M</span></div><div className="flex justify-between"><span>3: $5M-$14.9M</span> <span className="text-slate-400">2: $2M-$4.9M</span></div><div className="text-rose-500 font-bold">1: &lt; $2M</div></div></div>
                  <div className="bg-slate-50 p-4 rounded-xl"><p className="text-xs font-bold text-slate-500 mb-2 flex items-center gap-1"><Icon name="TrendingUp" size={12}/> Growth CAGR (25%)</p><div className="text-[11px] space-y-1"><div className="flex justify-between"><span>5: ≥ 15%</span> <span className="text-slate-400">4: 8%-14.9%</span></div><div className="flex justify-between"><span>3: 0%-7.9%</span> <span className="text-slate-400">2: -5% to -0.1%</span></div><div className="text-rose-500 font-bold">1: &lt; -5%</div></div></div>
                  <div className="bg-slate-50 p-4 rounded-xl border-l-4 border-rose-400"><p className="text-xs font-bold text-slate-500 mb-2 flex items-center gap-1"><Icon name="ShieldCheck" size={12}/> Financial Health (25%)</p><div className="text-[11px] space-y-1"><div className="flex justify-between"><span>5: ≤ 30 days (DSO ≤ 35)</span> <span className="text-slate-400">4: 31-45 days</span></div><div className="flex justify-between"><span>3: 46-60 days</span> <span className="text-slate-400">2: 61-75 days</span></div><div className="text-rose-600 font-black">Rule: Score 1-2 → No INVEST</div></div></div>
                  <div className="bg-slate-50 p-4 rounded-xl"><p className="text-xs font-bold text-slate-500 mb-2 flex items-center gap-1"><Icon name="Globe" size={12}/> Strategic Alignment / ESG (15%)</p><div className="text-[11px] space-y-1"><div className="flex justify-between"><span>5: Lead Tier / Top ESG Score</span> <span className="text-slate-400">4: Active ESG Collab</span></div><div className="flex justify-between"><span>3: Compliant / Standard</span> <span className="text-slate-400">2: Low ESG transparency</span></div><div className="text-rose-500 font-bold">1: Critical Risk / Alignment Gap</div></div></div>
                  <div className="bg-slate-50 p-4 rounded-xl"><p className="text-xs font-bold text-slate-500 mb-2 flex items-center gap-1"><Icon name="Zap" size={12}/> Future Proof / Innovation (20%)</p><div className="text-[11px] space-y-1"><div className="flex justify-between"><span>5: Co-development Partner</span> <span className="text-slate-400">4: Early Tech Adopter</span></div><div className="flex justify-between"><span>3: Standard R&D Needs</span> <span className="text-slate-400">2: Slow to Innovate</span></div><div className="text-rose-500 font-bold">1: Obsolescence Risk</div></div></div>
                </div>
              </section>

              <section>
                <h3 className="text-sm font-black text-emerald-600 uppercase mb-4 flex items-center gap-2"><Icon name="ShieldCheck" size={16} /> Competitive Strength (X-Axis)</h3>
                <div className="space-y-4">
                  <div className="bg-slate-50 p-4 rounded-xl border-l-4 border-rose-400"><p className="text-xs font-bold text-slate-500 mb-2 flex items-center gap-1"><Icon name="Target" size={12}/> Operating Margin % (25%)</p><div className="text-[11px] space-y-1"><div className="flex justify-between"><span>5: ≥ +4 pts vs target</span> <span className="text-slate-400">4: 0 to +3.9 pts</span></div><div className="flex justify-between"><span>3: 0 to -2 pts</span> <span className="text-slate-400">2: -2.1 to -5 pts</span></div><div className="text-rose-600 font-black">Rule: Score 1 → No PROTECT</div></div></div>
                  <div className="bg-slate-50 p-4 rounded-xl"><p className="text-xs font-bold text-slate-500 mb-2 flex items-center gap-1"><Icon name="CheckCircle2" size={12}/> OQL & Exceptions (20%)</p><div className="text-[11px] space-y-1"><div className="flex justify-between"><span>5: OQL ≥ 99.5%</span> <span className="text-slate-400">4: 99.0% - 99.4%</span></div><div className="flex justify-between"><span>3: 98.0% - 98.9%</span> <span className="text-slate-400">2: 96.5% - 97.9%</span></div><div className="text-rose-500 font-bold">1: &lt; 96.5%</div></div></div>
                  <div className="bg-slate-50 p-4 rounded-xl"><p className="text-xs font-bold text-slate-500 mb-2 flex items-center gap-1"><Icon name="TrendingUp" size={12}/> Efficiency / VPMH (20%)</p><div className="text-[11px] space-y-1"><div className="flex justify-between"><span>5: ≥ +15% vs Avg</span> <span className="text-slate-400">4: +5% to +14.9%</span></div><div className="flex justify-between"><span>3: ±4.9%</span> <span className="text-slate-400">2: -5% to -14.9%</span></div><div className="text-rose-500 font-bold">1: &lt; -15%</div></div></div>
                  <div className="bg-slate-50 p-4 rounded-xl"><p className="text-xs font-bold text-slate-500 mb-2 flex items-center gap-1"><Icon name="Clock" size={12}/> Average Lead Time (15%)</p><div className="text-[11px] space-y-1"><div className="flex justify-between"><span>5: &lt; 45 Days</span> <span className="text-slate-400">4: 45 - 60 Days</span></div><div className="flex justify-between"><span>3: 61 - 80 Days</span> <span className="text-slate-400">2: 81 - 100 Days</span></div><div className="text-rose-500 font-bold">1: &gt; 100 Days</div></div></div>
                  <div className="bg-slate-50 p-4 rounded-xl"><p className="text-xs font-bold text-slate-500 mb-2 flex items-center gap-1"><Icon name="LayoutGrid" size={12}/> Capacity Utilization (20%)</p><div className="text-[11px] space-y-1"><div className="flex justify-between"><span>5: 85% - 92% (Ideal)</span> <span className="text-slate-400">4: 75% - 84%</span></div><div className="flex justify-between"><span>3: 65% - 74%</span> <span className="text-slate-400">2: 50% - 64%</span></div><div className="text-rose-500 font-bold">1: &lt; 50% (Underutilized)</div></div></div>
                </div>
              </section>
            </div>
          </div>
        );

        return (
          <div className="flex h-screen w-full relative">
            <CheatSheet />
            {showCheatSheet && <div onClick={() => setShowCheatSheet(false)} className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[999] animate-in fade-in duration-300"></div>}
            
            {toast && (
              <div className={`fixed top-6 right-6 z-[999] px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 animate-in slide-in-from-right-10 duration-300 ${toast.type === 'success' ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-white'}`}>
                <Icon name={toast.type === 'success' ? 'CheckCircle2' : 'AlertCircle'} size={18} />
                <span className="text-sm font-bold">{toast.message}</span>
              </div>
            )}
            
            <nav className="h-full w-20 md:w-64 bg-slate-900 text-slate-400 flex flex-col border-r border-slate-800 transition-all flex-shrink-0 z-50 relative">
              <div className="p-4 md:p-6 flex items-center gap-3 border-b border-slate-800">
                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl flex-shrink-0">3</div>
                <div className="hidden md:block overflow-hidden">
                  <span className="text-white font-bold tracking-tight truncate uppercase block">Hansoll BD3</span>
                  <span className="text-[10px] text-slate-500 font-medium block">BUSINESS DIVISION 3</span>
                </div>
              </div>
              
              <div className="flex-1 py-8 space-y-2 px-3">
                {[
                  { id: 'home', label: 'Division Home', icon: 'Home' },
                  { id: 'matrix', label: 'BD3 Matrix', icon: 'BarChart3' },
                  { id: 'customers', label: 'Portfolio', icon: 'Users' },
                  { id: 'config', label: 'Scoring Logic', icon: 'Settings' },
                ].map(item => (
                  <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all ${activeTab === item.id ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-white/5 hover:text-slate-100'}`}>
                    <Icon name={item.icon} size={20} />
                    <span className="hidden md:block font-medium">{item.label}</span>
                  </button>
                ))}
              </div>

              <div className="p-4 border-t border-slate-800 bg-slate-950/40">
                <div className="flex items-center gap-2">
                  {authLoading ? <Icon name="CloudLightning" className="text-yellow-500 animate-pulse" size={16} /> : user ? <Icon name="Cloud" className="text-green-500" size={16} /> : <Icon name="CloudOff" className="text-slate-500" size={16} />}
                  <div className="text-[10px] uppercase font-bold tracking-wider">{authLoading ? "Init Cloud..." : user ? "Cloud Connected" : "Local Mode"}</div>
                </div>
              </div>

              <div className="p-4 md:p-6 border-t border-slate-800 flex items-center gap-3">
                <div className="w-8 h-8 rounded-full bg-indigo-600/30 text-indigo-400 font-black flex items-center justify-center flex-shrink-0 text-xs">TL</div>
                <div className="hidden md:block overflow-hidden">
                  <div className="text-xs text-slate-100 font-bold truncate">Tim Lee</div>
                  <div className="text-[10px] text-slate-500 uppercase truncate">VP / Head of BD3</div>
                </div>
              </div>
            </nav>

            <main className="flex-1 h-full overflow-y-auto p-4 md:p-8 lg:p-12">
              <div className="max-w-7xl mx-auto pb-20">
                
                {activeTab === 'home' && (
                  <div className="space-y-8 max-w-4xl mx-auto">

                                         <div className="flex gap-1">
                                           {[1,2,3,4,5].map(v => (

      root.render(<App />);

    startApp(); // Trigger the safe app load
